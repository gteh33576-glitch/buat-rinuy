<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>baca wooii </title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ff6aa2,#ffd2e7);
    overflow:hidden;
}

/* Amplop */
.envelope{
    position:relative;
    width:320px;
    height:220px;
    cursor:pointer;
}

/* Surat */
.letter{
    position:absolute;
    width:270px;
    height:170px;
    left:25px;
    bottom:35px;
    background:white;
    border-radius:10px;
    box-shadow:0 8px 15px rgba(0,0,0,.2);

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;

    color:#ff2f74;
    font-size:22px;
    font-weight:bold;

    /* Disembunyikan di dalam amplop */
    transform:translateY(130px);
    transition:1s;
    z-index:1;
}

/* Badan amplop */
.front{
    position:absolute;
    bottom:0;
    width:100%;
    height:170px;
    background:#ff7cab;
    border-radius:0 0 12px 12px;
    z-index:3;
}

/* Penutup amplop */
.flap{
    position:absolute;
    width:100%;
    height:120px;
    background:#ff99bf;
    clip-path:polygon(0 0,50% 100%,100% 0);
    transform-origin:top;
    transition:1s;
    z-index:5;
}

/* Saat dibuka */
.open .flap{
    transform:rotateX(180deg);
}

.open .letter{
    transform:translateY(-120px);
}

/* Tulisan klik */
.info{
    position:absolute;
    bottom:40px;
    color:white;
    font-size:20px;
    text-shadow:0 0 8px hotpink;
}

/* Hati */
.heart{
    position:absolute;
    font-size:22px;
    animation:fly 4s linear forwards;
}

@keyframes fly{
    0%{
        opacity:1;
        transform:translateY(0) scale(1);
    }

    100%{
        opacity:0;
        transform:translateY(-500px) scale(2);
    }
}
</style>
</head>

<body>

<div class="envelope" id="envelope">

    <div class="letter">
        ❤️<br><br>
        RINCUL JANGAN MAYAAA MAYAA TERUSS KOCAK
    </div>

    <div class="front"></div>
    <div class="flap"></div>

</div>

<div class="info">💌 Klik Amplop</div>

<script>

const envelope=document.getElementById("envelope");

let opened=false;

envelope.onclick=function(){

if(opened)return;

opened=true;

envelope.classList.add("open");

/* Efek hati */

for(let i=0;i<35;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=["❤️","💕","💖","💗"][Math.floor(Math.random()*4)];

heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.top=(window.innerHeight-80)+"px";
heart.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},4000);

}

}

</script>

</body>
</html>
