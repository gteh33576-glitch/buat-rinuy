<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surat Cinta 💌</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff6fa5,#ffb6d9,#ffe4ef);
    overflow:hidden;
}

/* Amplop */
.envelope{
    position:relative;
    width:260px;
    height:170px;
    cursor:pointer;
}

.base{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff7ba8;
    border-radius:0 0 10px 10px;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff95bb;
    clip-path:polygon(0 0,50% 55%,100% 0);
    transform-origin:top;
    transition:1s;
    z-index:3;
}

.letter{
    position:absolute;
    left:10%;
    width:80%;
    height:140px;
    background:white;
    border-radius:10px;
    padding:20px;
    text-align:center;
    top:20px;
    transition:1s;
    z-index:1;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.letter h2{
    color:#ff2f75;
    font-size:20px;
}

.letter p{
    margin-top:15px;
    color:#444;
    font-size:18px;
    font-weight:bold;
}

.open .flap{
    transform:rotateX(180deg);
}

.open .letter{
    transform:translateY(-140px);
}

/* Love */
.heart{
    position:absolute;
    font-size:25px;
    animation:fly 4s linear forwards;
}

@keyframes fly{
    from{
        transform:translateY(0) scale(1);
        opacity:1;
    }
    to{
        transform:translateY(-500px) scale(1.8);
        opacity:0;
    }
}

.info{
    position:absolute;
    bottom:40px;
    color:white;
    font-size:18px;
    text-shadow:0 0 10px hotpink;
}
</style>
</head>
<body>

<div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="base"></div>

    <div class="letter">
        <h2>💌 Surat Untukmu 💌</h2>
        <p>
            ❤️<br><br>
            RINCUL JANGAN MAYAAA MAYAA TERUSS KOCAK
        </p>
    </div>
</div>

<div class="info">
Klik amplopnya ❤️
</div>

<script>
const envelope=document.getElementById("envelope");

envelope.addEventListener("click",()=>{

    envelope.classList.toggle("open");

    for(let i=0;i<25;i++){
        const heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💖";

        heart.style.left=(window.innerWidth/2+(Math.random()*250-125))+"px";
        heart.style.top=(window.innerHeight/2+50)+"px";
        heart.style.fontSize=(20+Math.random()*20)+"px";

        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),4000);
    }

});
</script>

</body>
</html>
